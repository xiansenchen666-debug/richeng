<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高大上日程与待办管理</title>
    <!-- Tailwind & FontAwesome -->
    <link href="https://cdn.staticfile.net/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.staticfile.net/flatpickr/4.6.13/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.staticfile.net/flatpickr/4.6.13/themes/material_blue.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top right, #eef2ff 0%, #f8fafc 50%, #f0fdf4 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 1);
        }
        .list-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .list-item:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 24px -10px rgba(0,0,0,0.08);
            border-color: rgba(99, 102, 241, 0.3) !important;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .todo-checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }
        .todo-checkbox:hover {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .todo-checkbox:checked {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        }
        .todo-checkbox:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            position: absolute;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 优化 Flatpickr inline 样式，使其完美融入面板 */
        .flatpickr-calendar.inline {
            box-shadow: 0 4px 15px rgba(0,0,0,0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1rem;
            margin: 0 auto;
            width: 100%;
            max-width: 315px;
            background: rgba(255, 255, 255, 0.6);
        }
        .flatpickr-day.selected {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%) !important;
            border-color: transparent !important;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        
        /* 网格卡片日程的文本限制 */
        .schedule-card-text {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
            line-height: 1.6;
        }
        /* 输入框高级质感 */
        .premium-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        .premium-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .floating-popover {
            position: fixed;
            z-index: 60;
            width: min(420px, calc(100vw - 24px));
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 1.25rem;
            box-shadow: 0 20px 50px -18px rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .popover-wide {
            width: min(560px, calc(100vw - 24px));
        }
        .inline-note-editor {
            display: block;
            width: 100%;
            min-height: 60px;
            resize: vertical;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: #334155;
            transition: all 0.2s ease;
        }
        .inline-note-editor:hover {
            border-color: rgba(148, 163, 184, 0.35);
        }
        .inline-note-editor:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.92);
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        #dateEditorPopover .flatpickr-calendar.inline {
            width: 100%;
            max-width: none;
            margin: 0;
            box-shadow: none !important;
            border: 1px solid rgba(226, 232, 240, 0.9);
            background: rgba(248, 250, 252, 0.95);
        }
        .compact-schedule-row {
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            align-items: center;
            gap: 0.75rem;
        }
        .compact-schedule-content {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="py-10 px-4 sm:px-6 lg:px-8 text-gray-800 selection:bg-indigo-100 selection:text-indigo-900">

    <div class="w-full mx-auto" style="max-width: 1800px;">
        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600 mb-3 drop-shadow-sm tracking-tight">
                <i class="fa-solid fa-calendar-check mr-2 text-indigo-500 drop-shadow-md"></i>日程与待办工作台
            </h1>
            <p class="text-slate-500 text-sm sm:text-base font-medium tracking-wide">全局掌控，高效管理每一天</p>
        </div>

        <!-- 核心三列全屏布局 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <!-- ====== 左侧列 (占 3 份宽)：直接展开的日历与日程录入 ====== -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col h-[calc(100vh-140px)] min-h-[650px] md:col-span-4 xl:col-span-3">
                <h2 class="text-xl font-bold mb-5 flex items-center text-indigo-950 pb-3 border-b border-indigo-100/50">
                    <i class="fa-solid fa-calendar-plus text-indigo-500 mr-2 text-xl drop-shadow-sm"></i>新建日程
                </h2>
                
                <form id="scheduleForm" class="flex flex-col gap-5 h-full">
                    <!-- 直接展开的日历组件 -->
                    <div class="flex flex-col justify-center w-full bg-white/40 rounded-2xl p-2 border border-white/60 shadow-sm gap-2">
                        <input type="text" id="datetimeInput" required
                            class="w-full px-3 py-2 border border-transparent rounded-lg text-sm text-indigo-800 bg-transparent text-center font-medium outline-none">
                    </div>
                    
                    <div class="flex-1 flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-600 ml-1">日程内容</label>
                        <textarea id="scheduleContentInput" required placeholder="请填写具体安排..."
                            class="flex-1 w-full px-4 py-3 premium-input rounded-2xl text-sm resize-none outline-none text-slate-700"></textarea>
                    </div>
                    
                    <button type="submit" 
                        class="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold rounded-2xl shadow-[0_8px_20px_-6px_rgba(99,102,241,0.6)] hover:shadow-[0_12px_25px_-6px_rgba(99,102,241,0.7)] transform hover:-translate-y-0.5 transition-all duration-300 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i>保存日程
                    </button>
                </form>
            </div>

            <!-- ====== 中间列 (占 6 份宽)：网格卡片式日程展示 ====== -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col h-[calc(100vh-140px)] min-h-[650px] md:col-span-8 xl:col-span-6">
                <div class="flex items-center justify-between border-b border-indigo-100/50 pb-3 mb-5">
                    <h2 class="text-xl font-bold flex items-center text-indigo-950">
                        <i class="fa-regular fa-clock text-indigo-500 mr-2 text-xl drop-shadow-sm"></i>日程安排总览
                    </h2>
                    <span id="scheduleBadge" class="bg-indigo-100/80 border border-indigo-200 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full shadow-sm">0</span>
                </div>
                
                <div id="scheduleList" class="flex-1 overflow-y-auto pr-3 flex flex-col gap-3 content-start">
                    <div class="col-span-full flex justify-center items-center h-32 text-slate-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl mr-2"></i> 加载中...
                    </div>
                </div>
            </div>

            <!-- ====== 右侧列 (占 3 份宽)：待办事项清单 ====== -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col h-[calc(100vh-140px)] min-h-[650px] md:col-span-12 xl:col-span-3">
                <div class="flex items-center justify-between border-b border-emerald-100/50 pb-3 mb-5">
                    <h2 class="text-xl font-bold flex items-center text-emerald-950">
                        <i class="fa-solid fa-list-check text-emerald-500 mr-2 text-xl drop-shadow-sm"></i>待办事项清单
                    </h2>
                    <span id="todoBadge" class="bg-emerald-100/80 border border-emerald-200 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full shadow-sm">0</span>
                </div>

                <form id="todoForm" class="mb-5 flex gap-3">
                    <input type="text" id="todoContentInput" required placeholder="添加新任务 (回车提交)"
                        class="flex-1 px-4 py-3 premium-input rounded-2xl text-sm outline-none text-slate-700">
                    <button type="submit" 
                        class="px-5 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-semibold rounded-2xl shadow-[0_8px_20px_-6px_rgba(16,185,129,0.5)] hover:shadow-[0_12px_25px_-6px_rgba(16,185,129,0.6)] transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center">
                        <i class="fa-solid fa-plus text-lg"></i>
                    </button>
                </form>

                <div id="todoList" class="flex-1 overflow-y-auto pr-3 flex flex-col gap-3">
                    <div class="flex justify-center items-center h-32 text-slate-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl mr-2"></i> 加载中...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="dateEditorPopover" class="floating-popover popover-wide hidden p-5" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-base font-bold text-indigo-950 flex items-center gap-2">
                <i class="fa-regular fa-calendar-days text-indigo-500"></i>修改日期时间
            </h3>
            <button type="button" onclick="closeDateEditorPopover()" class="text-slate-400 hover:text-rose-500">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <input type="hidden" id="dateEditorScheduleId">
        <input type="text" id="dateEditorInput" class="hidden">
        <div class="flex justify-end gap-3">
            <button type="button" onclick="closeDateEditorPopover()"
                class="px-4 py-2.5 rounded-2xl font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
                取消
            </button>
            <button type="button" id="saveDateEditorBtn"
                class="px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold rounded-2xl shadow-[0_8px_20px_-6px_rgba(99,102,241,0.6)] transition-all duration-300">
                保存时间
            </button>
        </div>
    </div>

    <div id="deletePopover" class="floating-popover hidden p-5" onclick="event.stopPropagation()">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center">
                <i class="fa-solid fa-trash-can text-rose-500"></i>
            </div>
            <div>
                <div class="text-sm font-bold text-slate-800">确认删除</div>
                <div class="text-xs text-slate-500">删除后不可恢复</div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-4">
            <button type="button" onclick="closeDeletePopover()"
                class="w-full px-4 py-2.5 rounded-2xl font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
                取消
            </button>
            <button type="button" id="deletePopoverConfirmBtn"
                class="w-full px-5 py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-600 font-semibold rounded-2xl border border-rose-200 transition-all duration-300 inline-flex items-center justify-center gap-2">
                <i class="fa-solid fa-trash-can text-rose-500"></i>
                确认删除
            </button>
        </div>
    </div>

    <!-- html2canvas -->
    <script src="https://cdn.staticfile.net/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.staticfile.net/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdn.staticfile.net/flatpickr/4.6.13/l10n/zh.min.js"></script>

    <!-- 导出图片悬浮按钮 -->
    <button onclick="exportToImage()" class="fixed bottom-8 right-8 z-50 w-14 h-14 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full shadow-[0_10px_25px_-5px_rgba(99,102,241,0.5)] text-white flex items-center justify-center transform hover:scale-110 hover:-translate-y-1 transition-all duration-300" title="导出为图片">
        <i class="fa-solid fa-camera text-xl drop-shadow-sm"></i>
    </button>

    <script>
        function exportToImage() {
            const btn = document.querySelector('button[title="导出为图片"]');
            if (btn) btn.style.display = 'none';
            html2canvas(document.body, { 
                useCORS: true,
                scale: 2,
                backgroundColor: '#f8fafc'
            }).then(canvas => {
                const link = document.createElement('a');
                const d = new Date();
                const dateStr = d.getFullYear() + '' + (d.getMonth() + 1).toString().padStart(2, '0') + d.getDate().toString().padStart(2, '0');
                link.download = '日程概览_' + dateStr + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                if (btn) btn.style.display = 'flex';
            }).catch(err => {
                console.error("截图导出失败:", err);
                alert("导出图片失败，请重试");
                if (btn) btn.style.display = 'flex';
            });
        }

        // HTML 防注入
        function escapeHtml(unsafe) {
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 修改中文语言包，将一周的第一天设为周一
        if (flatpickr && flatpickr.l10ns && flatpickr.l10ns.zh) {
            flatpickr.l10ns.zh.firstDayOfWeek = 1;
        }

        // ================= 日历组件 (直接展开 Inline 模式) =================
        const fpInstance = flatpickr("#datetimeInput", {
            inline: true,                 // 直接展开，充分利用空间
            enableTime: true,             // 启用时间选择
            time_24hr: true,              // 24小时制
            locale: "zh",
            allowInput: true,
            dateFormat: "Y-m-d\\TH:i",
            minuteIncrement: 1,
            defaultMinute: 0,
            defaultDate: new Date(),
        });
        const dateEditorPopover = document.getElementById('dateEditorPopover');
        const deletePopover = document.getElementById('deletePopover');
        const deletePopoverConfirmBtn = document.getElementById('deletePopoverConfirmBtn');
        const saveDateEditorBtn = document.getElementById('saveDateEditorBtn');
        const dateEditorScheduleId = document.getElementById('dateEditorScheduleId');
        let deleteAction = null;

        const dateEditorFpInstance = flatpickr("#dateEditorInput", {
            inline: true,
            enableTime: true,
            time_24hr: true,
            locale: "zh",
            allowInput: true,
            dateFormat: "Y-m-d\\TH:i",
            minuteIncrement: 1,
            defaultMinute: 0,
        });

        function positionPopover(popover, triggerElement) {
            const rect = triggerElement.getBoundingClientRect();
            const popoverWidth = popover.offsetWidth || 420;
            const popoverHeight = popover.offsetHeight || 280;
            const left = Math.max(12, (window.innerWidth - popoverWidth) / 2);
            let top = rect.bottom + 12;
            if (top + popoverHeight > window.innerHeight - 24) {
                top = Math.max(24, (window.innerHeight - popoverHeight) / 2);
            }
            popover.style.left = `${left}px`;
            popover.style.top = `${top}px`;
        }

        function closeAllPopovers() {
            closeDateEditorPopover();
            closeDeletePopover();
        }

        window.closeDateEditorPopover = function() {
            dateEditorPopover.classList.add('hidden');
        };

        window.closeDeletePopover = function() {
            deletePopover.classList.add('hidden');
            deleteAction = null;
        };

        document.addEventListener('click', () => {
            closeAllPopovers();
        });

        saveDateEditorBtn.addEventListener('click', async () => {
            const scheduleId = dateEditorScheduleId.value;
            const contentEditor = document.getElementById(`scheduleContentEditor-${scheduleId}`);
            if (!scheduleId || !contentEditor) return;

            try {
                const res = await fetch(`/api/schedules/${scheduleId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        datetime: document.getElementById('dateEditorInput').value,
                        content: contentEditor.value
                    })
                });
                if (!res.ok) {
                    throw new Error('更新日程时间失败');
                }
                closeDateEditorPopover();
                loadSchedules();
            } catch (err) {
                console.error(err);
                alert('修改日期时间失败，请重试');
            }
        });

        deletePopoverConfirmBtn.addEventListener('click', async () => {
            if (!deleteAction) return;
            await deleteAction();
            closeDeletePopover();
        });

        // ================= 日程管理逻辑 (网格卡片版) =================
        const scheduleList = document.getElementById('scheduleList');
        const scheduleForm = document.getElementById('scheduleForm');
        const scheduleBadge = document.getElementById('scheduleBadge');

        async function loadSchedules() {
            try {
                const res = await fetch('/api/schedules');
                let data = await res.json();
                
                data.sort((a, b) => new Date(a.datetime).getTime() - new Date(b.datetime).getTime());
                const pendingSchedules = data.filter(item => !item.is_done);
                const completedSchedules = data.filter(item => item.is_done);
                scheduleBadge.textContent = pendingSchedules.length;
                
                if (data.length === 0) {
                    scheduleList.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center h-48 text-slate-400"><i class="fa-regular fa-calendar-xmark text-5xl mb-4 opacity-40"></i><p class="font-medium tracking-wide">暂无日程，享受空闲时光吧！</p></div>';
                    return;
                }

                scheduleList.innerHTML = '';
                const weekdayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const weekdayColorClasses = [
                    'bg-red-100/80 text-red-600',
                    'bg-orange-100/80 text-orange-600',
                    'bg-amber-100/80 text-amber-700',
                    'bg-emerald-100/80 text-emerald-700',
                    'bg-cyan-100/80 text-cyan-700',
                    'bg-blue-100/80 text-blue-700',
                    'bg-purple-100/80 text-purple-700'
                ];

                const wrapper = document.createElement('div');
                wrapper.className = 'w-full flex flex-col gap-3';

                const activeSection = document.createElement('div');
                activeSection.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 2xl:grid-cols-3 gap-2';

                if (pendingSchedules.length === 0) {
                    activeSection.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center h-28 text-slate-400 rounded-2xl border border-dashed border-slate-200 bg-white/40"><i class="fa-regular fa-circle-check text-2xl mb-2"></i><p class="text-sm font-medium">未完成日程已经清空</p></div>';
                }

                pendingSchedules.forEach(item => {
                    const dt = new Date(item.datetime);
                    const isPast = dt < new Date();
                    
                    const year = dt.getFullYear();
                    const month = (dt.getMonth()+1).toString().padStart(2,'0');
                    const date = dt.getDate().toString().padStart(2,'0');
                    const hours = dt.getHours().toString().padStart(2,'0');
                    const mins = dt.getMinutes().toString().padStart(2,'0');
                    const weekdayIndex = dt.getDay();
                    const weekday = weekdayNames[weekdayIndex];
                    const weekdayClass = isPast ? 'bg-slate-100 text-slate-500' : weekdayColorClasses[weekdayIndex];
                    
                    const dateStr = `${year}年${month}月${date}日`;
                    const timeStr = `${hours}:${mins}`;

                    const el = document.createElement('div');
                    el.className = `list-item border rounded-xl p-3 flex flex-col gap-2 h-fit backdrop-blur-sm relative overflow-hidden group ${
                        isPast
                            ? 'bg-slate-50/70 border-slate-200 opacity-75'
                            : 'bg-white/95 border-indigo-100 shadow-sm'
                    }`;
                    el.innerHTML = `
                        <div class="flex justify-between items-center border-b ${isPast ? 'border-slate-200' : 'border-indigo-50'} pb-2 pr-14">
                            <div class="flex items-center gap-2 ${isPast ? 'text-slate-500' : 'text-indigo-600'}">
                                <input type="checkbox" onchange="toggleSchedule(${item.id}, this.checked)" class="todo-checkbox flex-shrink-0 w-5 h-5" title="标记为完成">
                                <div class="flex flex-wrap items-center gap-1.5">
                                    <span class="text-xs font-semibold tracking-wide">${dateStr}</span>
                                    <span class="px-2 py-0.5 rounded-lg text-xs font-bold shadow-sm tracking-wide ${weekdayClass}">${weekday}</span>
                                    <span class="text-xs font-bold tracking-wide">${timeStr}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 absolute top-2 right-2 bg-white/90 backdrop-blur-md rounded-md p-0.5 shadow-sm border border-slate-100">
                                <button onclick="openDateEditorPopover(event, ${item.id}, '${item.datetime}')" class="text-slate-400 hover:text-indigo-500 transition-colors p-1" title="修改时间">
                                    <i class="fa-solid fa-pen-to-square text-xs"></i>
                                </button>
                                <button onclick="confirmDeleteSchedule(event, ${item.id})" class="text-slate-400 hover:text-rose-500 transition-colors p-1" title="删除">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <textarea id="scheduleContentEditor-${item.id}" data-datetime="${item.datetime}" data-original="${encodeURIComponent(item.content)}" onblur="saveScheduleContent(${item.id}, this)" onkeydown="handleScheduleEditorKeydown(event, this)" class="inline-note-editor ${isPast ? 'text-slate-500' : ''}">${escapeHtml(item.content)}</textarea>
                        </div>
                    `;
                    activeSection.appendChild(el);
                });

                wrapper.appendChild(activeSection);

                if (completedSchedules.length > 0) {
                    const completedSection = document.createElement('div');
                    completedSection.className = 'rounded-2xl border border-emerald-100/80 bg-white/65 p-4';

                    const completedHeader = document.createElement('div');
                    completedHeader.className = 'flex items-center justify-between mb-3 pb-3 border-b border-emerald-100';
                    completedHeader.innerHTML = `
                        <div class="flex items-center gap-2 text-emerald-900 font-bold">
                            <i class="fa-solid fa-circle-check text-emerald-500"></i>已完成安排
                        </div>
                        <span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-2.5 py-1 rounded-full">${completedSchedules.length}</span>
                    `;
                    completedSection.appendChild(completedHeader);

                    const completedList = document.createElement('div');
                    completedList.className = 'flex flex-col gap-3';

                    completedSchedules.forEach(item => {
                        const dt = new Date(item.datetime);
                        const year = dt.getFullYear();
                        const month = (dt.getMonth()+1).toString().padStart(2,'0');
                        const date = dt.getDate().toString().padStart(2,'0');
                        const hours = dt.getHours().toString().padStart(2,'0');
                        const mins = dt.getMinutes().toString().padStart(2,'0');
                        const row = document.createElement('div');
                        row.className = 'compact-schedule-row rounded-xl border border-emerald-100 bg-emerald-50/70 px-3 py-2 text-emerald-800';
                        row.innerHTML = `
                            <input type="checkbox" checked onchange="toggleSchedule(${item.id}, this.checked)" class="todo-checkbox flex-shrink-0 w-4 h-4" title="取消完成">
                            <span class="text-xs font-bold whitespace-nowrap">${month}-${date} ${hours}:${mins}</span>
                            <span class="compact-schedule-content text-xs line-through decoration-emerald-500">${escapeHtml(item.content)}</span>
                            <button onclick="confirmDeleteSchedule(event, ${item.id})" class="text-emerald-400 hover:text-rose-500 transition-colors p-1 rounded-lg" title="删除">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        `;
                        completedList.appendChild(row);
                    });

                    completedSection.appendChild(completedList);
                    wrapper.appendChild(completedSection);
                }

                scheduleList.appendChild(wrapper);
            } catch (err) {
                console.error(err);
                scheduleList.innerHTML = '<div class="col-span-full text-red-500 text-center mt-4">加载失败，请确保后台服务正在运行</div>';
            }
        }

        scheduleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            // 获取日历组件当前选中的时间
            const dt = document.getElementById('datetimeInput').value;
            const contentInput = document.getElementById('scheduleContentInput');
            const content = contentInput.value;
            
            try {
                const res = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ datetime: dt, content: content })
                });
                if (res.ok) {
                    contentInput.value = '';
                    contentInput.focus();
                    // 提交后重置日历到当前时间
                    fpInstance.setDate(new Date());
                    loadSchedules();
                }
            } catch (err) { console.error(err); }
        });

        window.confirmDeleteSchedule = function(event, id) {
            event.stopPropagation();
            closeAllPopovers();
            deletePopover.classList.remove('hidden');
            positionPopover(deletePopover, event.currentTarget);
            deleteAction = async () => {
                try {
                    await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
                    loadSchedules();
                } catch (err) { console.error(err); }
            };
        };

        window.toggleSchedule = async function(id, is_done) {
            try {
                let res = await fetch(`/api/schedules/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_done: is_done })
                });
                if (!res.ok) {
                    res = await fetch(`/api/schedules/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_done: is_done })
                    });
                }
                if (!res.ok) {
                    throw new Error('更新日程状态失败');
                }
                loadSchedules();
            } catch (err) {
                console.error(err);
                alert('勾选状态保存失败，请刷新后重试');
            }
        };

        window.openDateEditorPopover = function(event, id, datetimeValue) {
            event.stopPropagation();
            closeAllPopovers();
            dateEditorScheduleId.value = id;
            dateEditorFpInstance.setDate(datetimeValue, true, "Y-m-d\\TH:i");
            dateEditorPopover.classList.remove('hidden');
            positionPopover(dateEditorPopover, event.currentTarget);
        };

        window.handleScheduleEditorKeydown = function(event, textarea) {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                event.preventDefault();
                textarea.blur();
            }
        };

        window.saveScheduleContent = async function(id, textarea) {
            const originalValue = decodeURIComponent(textarea.dataset.original || '');
            const currentValue = textarea.value;
            const datetimeValue = textarea.dataset.datetime;

            if (currentValue === originalValue) return;

            try {
                const res = await fetch(`/api/schedules/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ datetime: datetimeValue, content: currentValue })
                });
                if (res.ok) {
                    textarea.dataset.original = encodeURIComponent(currentValue);
                    loadSchedules();
                } else {
                    throw new Error('更新日程内容失败');
                }
            } catch (err) {
                console.error(err);
                alert('修改日程内容失败，请重试');
            }
        };

        // ================= 待办管理逻辑 (紧凑列表版) =================
        const todoList = document.getElementById('todoList');
        const todoForm = document.getElementById('todoForm');
        const todoBadge = document.getElementById('todoBadge');

        async function loadTodos() {
            try {
                const res = await fetch('/api/todos');
                const data = await res.json();
                
                const pendingCount = data.filter(t => !t.is_done).length;
                todoBadge.textContent = pendingCount;
                
                if (data.length === 0) {
                    todoList.innerHTML = '<div class="flex flex-col items-center justify-center h-48 text-slate-400"><i class="fa-solid fa-clipboard-check text-5xl mb-4 opacity-40"></i><p class="font-medium tracking-wide">所有任务都已完成！</p></div>';
                    return;
                }

                todoList.innerHTML = '';
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `list-item bg-white/90 border ${item.is_done ? 'border-slate-100 opacity-60 bg-slate-50/50' : 'border-emerald-100 shadow-sm'} rounded-2xl p-4 flex items-center gap-4 group`;
                    el.innerHTML = `
                        <input type="checkbox" ${item.is_done ? 'checked' : ''} onchange="toggleTodo(${item.id}, this.checked)" class="todo-checkbox flex-shrink-0">
                        <div class="flex-grow">
                            <p class="text-sm ${item.is_done ? 'text-slate-400 line-through' : 'text-slate-700 font-semibold'} break-all">${escapeHtml(item.content)}</p>
                        </div>
                        <button onclick="confirmDeleteTodo(event, ${item.id})" class="text-slate-300 opacity-0 group-hover:opacity-100 hover:text-rose-500 p-2 rounded-lg transition-all duration-300 hover:bg-rose-50" title="删除">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    `;
                    todoList.appendChild(el);
                });
            } catch (err) {
                console.error(err);
                todoList.innerHTML = '<div class="text-red-500 text-center mt-4">加载失败</div>';
            }
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const contentInput = document.getElementById('todoContentInput');
            const content = contentInput.value;
            
            try {
                const res = await fetch('/api/todos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                if (res.ok) {
                    contentInput.value = '';
                    contentInput.focus();
                    loadTodos();
                }
            } catch (err) { console.error(err); }
        });

        window.toggleTodo = async function(id, is_done) {
            try {
                await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_done: is_done })
                });
                loadTodos();
            } catch (err) { console.error(err); }
        };

        window.confirmDeleteTodo = function(event, id) {
            event.stopPropagation();
            closeAllPopovers();
            deletePopover.classList.remove('hidden');
            positionPopover(deletePopover, event.currentTarget);
            deleteAction = async () => {
                try {
                    await fetch(`/api/todos/${id}`, { method: 'DELETE' });
                    loadTodos();
                } catch (err) { console.error(err); }
            };
        };

        // 初始化加载
        loadSchedules();
        loadTodos();
    </script>
</body>
</html>
